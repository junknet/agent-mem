[program:memory-mcp]
command=/opt/memory-mcp/out/memory-mcp --host 0.0.0.0 --port 8787 --transport http
directory=/opt/memory-mcp
autostart=true
autorestart=true
startsecs=5
startretries=10
stopsignal=TERM
stopasgroup=true
killasgroup=true
environment=AGENT_TOOLS_ENV="/opt/memory-mcp/.env",AGENT_MEM_CONFIG="/opt/memory-mcp/config/settings.yaml"
stdout_logfile=/var/log/memory-mcp.out.log
stderr_logfile=/var/log/memory-mcp.err.log
